services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meetmind
      POSTGRES_USER: meetmind
      POSTGRES_PASSWORD: meetmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: meetmind
      DB_USERNAME: meetmind
      DB_PASSWORD: meetmind
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
